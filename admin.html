<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <title>打卡管理 — Admin</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/style.css" />
  <!-- qrcode.js for generating QR codes -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    // Ensure QRCode is available globally before module runs
    window.__qrReady = new Promise(resolve => {
      if (typeof QRCode !== 'undefined') return resolve();
      const check = setInterval(() => {
        if (typeof QRCode !== 'undefined') { clearInterval(check); resolve(); }
      }, 50);
    });
  </script>
  <style>
    /* Login overlay */
    #login-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg, #f8f9fa);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #login-overlay.hidden { display: none; }

    .login-card {
      background: var(--card-bg, #ffffff);
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }
    .login-logo {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 8px;
    }
    .login-title {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text, #111827);
    }
    .login-subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted, #6b7280);
      margin-bottom: 28px;
    }
    .login-error {
      color: var(--error, #ef4444);
      font-size: 0.85rem;
      margin-bottom: 12px;
      text-align: center;
      min-height: 20px;
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      color: #3c4043;
      border: 1.5px solid #dadce0;
      font-weight: 500;
    }
    .btn-google:hover { background: #f7f8f8; }

    /* User info in header */
    .header-user {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    .header-email {
      font-size: 0.75rem;
      color: var(--text-muted, #6b7280);
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn-logout {
      padding: 4px 10px;
      font-size: 0.75rem;
      border: 1px solid var(--border, #e5e7eb);
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      color: var(--text-muted, #6b7280);
      white-space: nowrap;
    }
    .btn-logout:hover { background: var(--border, #e5e7eb); }
  </style>
</head>
<body>

  <!-- Login Overlay -->
  <div id="login-overlay">
    <div class="login-card">
      <div class="login-logo">🔑</div>
      <div class="login-title">打卡管理系統</div>
      <div class="login-subtitle">請以管理員 Google 帳號登入</div>

      <div class="login-error" id="login-error"></div>

      <button class="btn-login btn-google" id="btn-login" onclick="handleLogin()">
        <svg width="18" height="18" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:8px;">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.0 24.0 0 0 0 0 21.56l7.98-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        使用 Google 帳號登入
      </button>
    </div>
  </div>

  <!-- Header -->
  <header class="app-header">
    <span class="logo">🔑</span>
    <div>
      <h1>打卡管理</h1>
      <div class="subtitle" id="header-date">載入中…</div>
    </div>
    <div class="header-user" id="header-user" style="display:none;">
      <span class="header-email" id="header-email"></span>
      <button class="btn-logout" onclick="handleLogout()">登出</button>
    </div>
  </header>

  <!-- Main -->
  <main class="main-content">

    <!-- Status Card (hidden) -->
    <!-- <div class="card">
      <div class="card-title">📊 今日狀態</div>
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px;">
        <span class="status-badge status-idle" id="token-status">檢查中…</span>
      </div>
      <div id="token-info" style="display:none;">
        <div class="token-info">
          <strong>Token</strong>
          <div class="token-value" id="token-display"></div>
        </div>
        <div class="token-info">
          <div id="expiry-info"></div>
        </div>
      </div>
    </div> -->

    <!-- QR Code Card -->
    <div class="card">
      <div class="card-title">📱 每日 QR Code</div>
      <div id="qr-container">
        <div style="color:var(--text-muted); font-size:0.875rem;">產生 QR Code 中…</div>
      </div>

      <div style="margin-top:16px; display:flex; flex-direction:column; gap:8px;">
        <button class="btn btn-primary" id="btn-regen" onclick="regenerateToken()" style="display:none;">
          🔄 重新產生 Token
        </button>
        <!-- <button class="btn btn-outline" onclick="downloadQR()">
          💾 下載 QR Code
        </button> -->
      </div>
    </div>

    <!-- Today's Records Card -->
    <div class="card">
      <div class="card-title">📋 今日打卡記錄</div>
      <div id="records-list">
        <div style="color:var(--text-muted); font-size:0.85rem; text-align:center; padding:12px;">載入中…</div>
      </div>
      <hr class="divider" />
      <button class="btn btn-outline" onclick="loadTodayRecords()">
        🔄 重新整理
      </button>
    </div>

    <!-- All Tokens Card -->
    <div class="card">
      <div class="card-title">🗂 Token 歷史</div>
      <div id="tokens-list">
        <div style="color:var(--text-muted); font-size:0.85rem; text-align:center; padding:12px;">載入中…</div>
      </div>
    </div>

  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      collection,
      query,
      where,
      orderBy,
      getDocs,
      serverTimestamp,
      Timestamp
    } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';
    import {
      getAuth,
      signInWithPopup,
      GoogleAuthProvider,
      signOut,
      onAuthStateChanged
    } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyBQmOSGpMyVKCSHnsz63LNIRANp_cvukzg",
      authDomain: "medialab-356306.firebaseapp.com",
      projectId: "medialab-356306",
      storageBucket: "medialab-356306.appspot.com",
      messagingSenderId: "1007110536706",
      appId: "1:1007110536706:web:42e05c2fb1ba799262311b"
    };

    const app = initializeApp(FIREBASE_CONFIG);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    // Expose to global scope
    window.__db = db;
    window.__auth = auth;
    window.__fsOps = { doc, getDoc, setDoc, collection, query, where, orderBy, getDocs, serverTimestamp, Timestamp };

    // Auth state observer
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // Logged in
        document.getElementById('login-overlay').classList.add('hidden');
        document.getElementById('header-user').style.display = 'flex';
        document.getElementById('header-email').textContent = user.email;

        // Initialize app after QRCode lib is ready
        window.__qrReady.then(() => init());
      } else {
        // Not logged in — show login overlay
        document.getElementById('login-overlay').classList.remove('hidden');
        document.getElementById('header-user').style.display = 'none';
      }
    });

    // Login handler — Google OAuth
    window.handleLogin = async function() {
      const errorEl = document.getElementById('login-error');
      const btnLogin = document.getElementById('btn-login');

      errorEl.textContent = '';
      btnLogin.disabled = true;

      try {
        await signInWithPopup(auth, googleProvider);
        // onAuthStateChanged will handle the rest
      } catch (err) {
        console.error('Login error:', err);
        const msgs = {
          'auth/popup-closed-by-user': '登入視窗已關閉',
          'auth/cancelled-popup-request': '登入已取消',
          'auth/popup-blocked': '彈出視窗被封鎖，請允許後重試',
          'auth/unauthorized-domain': '此網域未授權，請至 Firebase Console 設定'
        };
        errorEl.textContent = msgs[err.code] || `登入失敗：${err.message}`;
      } finally {
        btnLogin.disabled = false;
      }
    };

    // Logout handler
    window.handleLogout = async function() {
      await signOut(auth);
      showToast('已登出', 'info');
    };

    async function init() {
      // Update header date
      const today = getTodayDate();
      document.getElementById('header-date').textContent = formatDate(today);

      // Register SW
      registerSW();

      // Load or create today's token
      await loadOrCreateToken(today);

      // Load records
      await loadTodayRecords();

      // Load token history
      await loadTokenHistory();
    }

    async function loadOrCreateToken(today) {
      const { doc, getDoc } = window.__fsOps;
      const db = window.__db;

      try {
        const tokenRef = doc(db, 'tokens', today);
        const snap = await getDoc(tokenRef);

        if (snap.exists()) {
          // Token already exists
          const data = snap.data();
          displayTokenInfo(data);
          generateQRCode(buildQRPayload(today, data.token, data.expiresAt));
          document.getElementById('btn-regen').style.display = 'block';
        } else {
          // Create new token
          await createDailyToken(today);
        }
      } catch (err) {
        console.error('Token load error:', err);
        showToast('無法載入 Token: ' + err.message, 'error');
      }
    }

    async function createDailyToken(today) {
      const { doc, setDoc, serverTimestamp, Timestamp } = window.__fsOps;
      const db = window.__db;

      const token = generateUUID();

      // Calculate expiry: today 23:59:59
      const expDate = new Date();
      expDate.setHours(23, 59, 59, 0);
      const expiresAt = Timestamp.fromDate(expDate);
      const exp = Math.floor(expDate.getTime() / 1000);

      const tokenData = {
        token,
        createdAt: serverTimestamp(),
        expiresAt,
        exp
      };

      const tokenRef = doc(db, 'tokens', today);
      await setDoc(tokenRef, tokenData);

      displayTokenInfo({ token, expiresAt, exp });
      generateQRCode(buildQRPayload(today, token, expiresAt));
      document.getElementById('btn-regen').style.display = 'block';

      showToast('今日 Token 已產生', 'success');
    }

    window.regenerateToken = async function() {
      const today = getTodayDate();
      if (!confirm(`確定要重新產生今日 Token 嗎？\n舊的 QR Code 將立即失效！`)) return;
      await createDailyToken(today);
      showToast('Token 已重新產生', 'info');
    };

    function buildQRPayload(date, token, expiresAt) {
      let exp;
      if (typeof expiresAt === 'number') {
        exp = expiresAt;
      } else if (expiresAt && expiresAt.toDate) {
        exp = Math.floor(expiresAt.toDate().getTime() / 1000);
      } else {
        exp = getTodayExpiry();
      }

      return JSON.stringify({
        app: 'punch-clock',
        date,
        token,
        exp
      });
    }

    function displayTokenInfo(data) {
      // token-info card is commented out; keep function for future use
    }

    function generateQRCode(payload) {
      const container = document.getElementById('qr-container');
      container.innerHTML = '';

      window.__currentQRPayload = payload;

      try {
        window.__qrInstance = new QRCode(container, {
          text: payload,
          width: 280,
          height: 280,
          colorDark: '#000000',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M
        });
      } catch (err) {
        console.error('QR generation error:', err);
        container.innerHTML = '<div style="color:var(--error); padding:20px;">QR Code 產生失敗</div>';
      }
    }

    window.downloadQR = function() {
      const img = document.querySelector('#qr-container img');
      const canvas = document.querySelector('#qr-container canvas');
      if (!img && !canvas) {
        showToast('QR Code 尚未產生', 'warning');
        return;
      }

      const link = document.createElement('a');
      link.download = `punch-qr-${getTodayDate()}.png`;
      link.href = img ? img.src : canvas.toDataURL('image/png');
      link.click();
    };

    // ===== Load Today's Records =====
    window.loadTodayRecords = async function() {
      const { collection, query, orderBy, getDocs } = window.__fsOps;
      const db = window.__db;
      const today = getTodayDate();
      const list = document.getElementById('records-list');

      try {
        const recordsRef = collection(db, 'punches', today, 'records');
        const q = query(recordsRef, orderBy('timestamp'));
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          list.innerHTML = '<div style="color:var(--text-muted); font-size:0.85rem; text-align:center; padding:12px;">今日尚無打卡記錄</div>';
          return;
        }

        list.innerHTML = '';
        snapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const isIn = data.type === 'clock_in';
          const timeStr = data.timestamp ? formatTime(data.timestamp) : '未知時間';

          const item = document.createElement('div');
          item.style.cssText = 'display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border);';
          item.innerHTML = `
            <div style="display:flex; align-items:center; gap:10px;">
              <span style="font-size:1.2rem;">${isIn ? '☀️' : '🌙'}</span>
              <div>
                <div style="font-weight:600; font-size:0.9rem;">${isIn ? '上班' : '下班'}</div>
                <div style="font-size:0.75rem; color:var(--text-muted);">${data.userId || '—'}</div>
                <div style="font-size:0.75rem; color:var(--text-muted);">
                  ${data.gps?.lat ? `📍 ${data.gps.lat.toFixed(4)}, ${data.gps.lng.toFixed(4)}` : '📍 GPS 無資料'}
                </div>
              </div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:0.9rem; font-weight:600;">${timeStr}</div>
              ${data.gps?.accuracy ? `<div style="font-size:0.75rem; color:var(--text-muted);">±${data.gps.accuracy}m</div>` : ''}
            </div>
          `;
          list.appendChild(item);
        });
      } catch (err) {
        console.error('Load records error:', err);
        list.innerHTML = `<div style="color:var(--error); font-size:0.85rem; padding:12px;">載入失敗: ${err.message}</div>`;
      }
    };

    // ===== Load Token History =====
    async function loadTokenHistory() {
      const { collection, getDocs } = window.__fsOps;
      const db = window.__db;
      const list = document.getElementById('tokens-list');

      try {
        const tokensRef = collection(db, 'tokens');
        const snapshot = await getDocs(tokensRef);

        if (snapshot.empty) {
          list.innerHTML = '<div style="color:var(--text-muted); font-size:0.85rem; text-align:center; padding:12px;">無歷史記錄</div>';
          return;
        }

        // Sort by date descending
        const items = [];
        snapshot.forEach(docSnap => {
          items.push({ id: docSnap.id, ...docSnap.data() });
        });
        items.sort((a, b) => b.id.localeCompare(a.id));

        list.innerHTML = '';
        items.forEach(item => {
          const today = getTodayDate();
          const isToday = item.id === today;

          const div = document.createElement('div');
          div.style.cssText = 'display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border);';
          div.innerHTML = `
            <div>
              <div style="font-weight:600; font-size:0.9rem;">
                ${item.id} ${isToday ? '<span style="font-size:0.7rem; background:var(--primary); color:white; padding:2px 6px; border-radius:10px; margin-left:4px;">今日</span>' : ''}
              </div>
              <div style="font-size:0.7rem; color:var(--text-muted); font-family:monospace;">${item.token?.substring(0, 12)}…</div>
            </div>
            <div style="font-size:0.75rem; color:var(--text-muted); text-align:right;">
              ${item.createdAt?.toDate ? item.createdAt.toDate().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) : ''}
            </div>
          `;
          list.appendChild(div);
        });
      } catch (err) {
        console.error('Load tokens error:', err);
        list.innerHTML = `<div style="color:var(--error); font-size:0.85rem; padding:12px;">載入失敗: ${err.message}</div>`;
      }
    }

  </script>

  <!-- Utils -->
  <script src="/js/utils.js"></script>

</body>
</html>
